name: Regression Test

on:
  pull_request:
    branches: [ master ]

jobs:
  regression:
    runs-on: macos-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.1"

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build PR version
        run: swift build

      - name: Build base version
        run: |
          git fetch origin master
          git worktree add ../swiftastgen-base origin/master
          (cd ../swiftastgen-base && swift build)

      - name: Run regression script
        run: |
          BASE_SHA=$(git rev-parse --short origin/master)
          PR_SHA=$(git rev-parse --short HEAD)
          python3 scripts/regression.py \
            --base-dist ../swiftastgen-base/.build/debug \
            --pr-dist .build/debug \
            --pr-number "${{ github.event.pull_request.number }}" \
            --base-ref "master @ ${BASE_SHA}" \
            --pr-ref "${{ github.head_ref }} @ ${PR_SHA}" \
            --output-diffs regression-diffs \
            > regression-report.md

      - name: Clean up base worktree
        if: always()
        run: git worktree remove --force ../swiftastgen-base

      - name: Upload diff artifacts
        uses: actions/upload-artifact@v7
        with:
          name: regression-diffs
          path: regression-diffs/
          if-no-files-found: ignore

      - name: Post PR comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            let body = fs.readFileSync('regression-report.md', 'utf8');
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            body += `\n\n---\n📎 Full diff files available as [workflow artifacts](${runUrl}).`;
            const marker = '<!-- swiftastgen-regression -->';
            body = marker + '\n' + body;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
