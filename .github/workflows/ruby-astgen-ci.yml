name: Ruby AST Generator CI

on:
  workflow_call:  # Called by monorepo-ci.yml
  workflow_dispatch:  # Manual runs for testing

defaults:
  run:
    working-directory: ruby-astgen

jobs:
  ruby-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1.4
          bundler-cache: true
          working-directory: ruby-astgen

      - name: Run the default task
        run: bundle exec rake
