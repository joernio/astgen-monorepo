name: Rust AST Generator Release

on:
  push:
    tags:
      - 'rust-astgen/v*'

permissions:
  contents: read

defaults:
  run:
    working-directory: rust-astgen

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Extract version from tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/rust-astgen/v}
          echo "TAG_VERSION=$TAG_VERSION" >> $GITHUB_ENV
          echo "Tag version: $TAG_VERSION"

      - name: Verify tag matches Cargo.toml
        run: |
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Cargo.toml version: $CARGO_VERSION"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

      - name: Run tests
        run: cargo test --locked

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            asset_name: rust_ast_gen-linux
            binary_extension: ""
          - os: ubuntu-24.04-arm
            asset_name: rust_ast_gen-linux-arm
            binary_extension: ""
          - os: macos-15-intel
            asset_name: rust_ast_gen-macos
            binary_extension: ""
          - os: macos-15
            asset_name: rust_ast_gen-macos-arm
            binary_extension: ""
          - os: windows-2025
            asset_name: rust_ast_gen-win.exe
            binary_extension: ".exe"
          - os: windows-11-arm
            asset_name: rust_ast_gen-win-arm.exe
            binary_extension: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        working-directory: rust-astgen
        run: cargo build --release --locked

      - name: Rename release binary
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/rust_ast_gen${{ matrix.binary_extension }}" "dist/${{ matrix.asset_name }}"

      - name: Generate RustNodeSyntax.scala
        if: matrix.os == 'ubuntu-24.04'
        run: cargo run --release --locked --bin scala_bindings_gen -- --output ../dist/RustNodeSyntax.scala

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: asset-${{ matrix.asset_name }}
          path: rust-astgen/dist/${{ matrix.asset_name }}
          if-no-files-found: error

      - name: Upload RustNodeSyntax.scala
        if: matrix.os == 'ubuntu-24.04'
        uses: actions/upload-artifact@v4
        with:
          name: asset-RustNodeSyntax.scala
          path: rust-astgen/dist/RustNodeSyntax.scala
          if-no-files-found: error

  release:
    needs:
      - verify
      - build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: asset-*
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release-artifacts/*
