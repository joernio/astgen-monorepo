name: AST Generator Regression Framework Release

on:
  push:
    tags:
      - 'astgen-regression/v*'

permissions:
  contents: write

defaults:
  run:
    working-directory: astgen-regression

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'astgen-regression/requirements.txt'

      - name: Extract version from tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/astgen-regression/v}
          echo "TAG_VERSION=$TAG_VERSION" >> $GITHUB_ENV
          echo "Tag version: $TAG_VERSION"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install build

      - name: Run tests
        run: |
          pytest -v

      - name: Build distribution package
        run: |
          python -m build

      - name: Create release archive
        run: |
          cd ..
          tar -czf astgen-regression-${{ env.TAG_VERSION }}.tar.gz \
            astgen-regression/*.py \
            astgen-regression/requirements.txt \
            astgen-regression/README.md \
            astgen-regression/pyproject.toml \
            astgen-regression/tests/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            astgen-regression-${{ env.TAG_VERSION }}.tar.gz
          body: |
            Release of AST Generator Regression Framework ${{ env.TAG_VERSION }}

            ## Installation
            ```bash
            pip install astgen-regression-${{ env.TAG_VERSION }}.tar.gz
            ```
