name: AST Generator Regression Framework Release

on:
  push:
    tags:
      - 'astgen-regression/v*'
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: astgen-regression

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'

      - name: Discover latest tag (manual run)
        if: github.event_name == 'workflow_dispatch'
        run: |
          LATEST_TAG=$(git tag --list 'astgen-regression/v*' --sort=-v:refname | head -n 1)
          echo "RELEASE_TAG=$LATEST_TAG" >> $GITHUB_ENV
          echo "Using latest tag: $LATEST_TAG"
        working-directory: .

      - name: Set tag from push event
        if: github.event_name == 'push'
        run: |
          echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
        working-directory: .

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'astgen-regression/requirements.txt'

      - name: Extract version from tag
        run: |
          TAG_VERSION=${RELEASE_TAG#astgen-regression/v}
          echo "TAG_VERSION=$TAG_VERSION" >> $GITHUB_ENV
          echo "Tag version: $TAG_VERSION"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-cov types-setuptools types-PyYAML
          pip install -e .
          pip install build

      - name: Run ruff linting
        run: |
          ruff check .

      - name: Run ruff format check
        run: |
          ruff format --check .

      - name: Run mypy type checking
        run: |
          mypy .

      - name: Run tests
        run: |
          pytest -v --cov=. --cov-report=term-missing

      - name: Build distribution package
        run: |
          python -m build

      - name: Create release archive
        run: |
          cd ..
          tar -czf astgen-regression-${{ env.TAG_VERSION }}.tar.gz \
            astgen-regression/*.py \
            astgen-regression/requirements.txt \
            astgen-regression/README.md \
            astgen-regression/pyproject.toml \
            astgen-regression/tests/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            astgen-regression-${{ env.TAG_VERSION }}.tar.gz
          body: |
            Release of AST Generator Regression Framework ${{ env.TAG_VERSION }}

            ## Installation
            ```bash
            pip install astgen-regression-${{ env.TAG_VERSION }}.tar.gz
            ```
