name: Go AST Generator CI

on:
  workflow_call:  # Called by monorepo-ci.yml
  workflow_dispatch:  # Manual runs for testing

defaults:
  run:
    working-directory: go-astgen

jobs:
  go-ci:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.18
          cache: true
          cache-dependency-path: go-astgen/go.sum
      - name: Build
        run: ./build.sh
