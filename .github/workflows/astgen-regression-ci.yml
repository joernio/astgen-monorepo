name: AST Generator Regression Framework CI

on:
  workflow_call:  # Called by monorepo-ci.yml
  workflow_dispatch:  # Manual runs for testing

defaults:
  run:
    working-directory: astgen-regression

jobs:
  astgen-regression-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'astgen-regression/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-cov types-setuptools types-PyYAML
          pip install -e .

      - name: Run ruff linting
        run: |
          ruff check .

      - name: Run ruff format check
        run: |
          ruff format --check .

      - name: Run mypy type checking
        run: |
          mypy .

      - name: Run tests
        run: |
          pytest -v --cov=. --cov-report=term-missing
