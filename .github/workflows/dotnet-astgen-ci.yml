name: .NET AST Generator CI

on:
  workflow_call:  # Called by monorepo-ci.yml
  workflow_dispatch:  # Manual runs for testing

defaults:
  run:
    working-directory: dotnet-astgen

jobs:
  dotnet-ci-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'
          cache: true
          cache-dependency-path: dotnet-astgen/**/*.csproj
      - name: Install dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build
      - name: Test with the dotnet CLI
        run: dotnet test
  dotnet-ci-formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: '0'
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'
          cache: true
          cache-dependency-path: dotnet-astgen/**/*.csproj
      - name: Check formatting
        run:  dotnet format --verify-no-changes
