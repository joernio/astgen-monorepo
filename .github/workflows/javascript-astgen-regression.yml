name: JavaScript AST Generator Regression

on:
  pull_request:
    paths:
      - 'javascript-astgen/**'
      - 'astgen-regression/**'
      - '.github/workflows/javascript-astgen-regression.yml'

defaults:
  run:
    working-directory: javascript-astgen

jobs:
  regression:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'
          cache-dependency-path: 'javascript-astgen/yarn.lock'

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install astgen-regression
        run: |
          cd ../astgen-regression
          pip install -e .

      - name: Build PR version
        run: |
          yarn install
          yarn build

      - name: Build base version
        run: |
          set -e
          git fetch origin ${{ github.base_ref }}
          git worktree add ../javascript-astgen-base "origin/${{ github.base_ref }}" --no-checkout
          (cd ../javascript-astgen-base && git checkout "origin/${{ github.base_ref }}" -- javascript-astgen)
          (cd ../javascript-astgen-base/javascript-astgen && yarn install && yarn build)

      - name: Run regression tests
        run: |
          BASE_SHA=$(git rev-parse --short "origin/${{ github.base_ref }}")
          PR_SHA=$(git rev-parse --short HEAD)
          astgen-regression compare \
            --config regression.yaml \
            --base-dist ../javascript-astgen-base/javascript-astgen/dist \
            --pr-dist dist \
            --pr-number "${{ github.event.pull_request.number }}" \
            --base-ref "${{ github.base_ref }} @ ${BASE_SHA}" \
            --pr-ref "${{ github.head_ref }} @ ${PR_SHA}" \
            --output-diffs regression-diffs \
            > regression-report.md || true

      - name: Clean up base worktree
        if: always()
        run: git worktree remove --force ../javascript-astgen-base

      - name: Upload diff artifacts
        uses: actions/upload-artifact@v6
        with:
          name: regression-diffs
          path: javascript-astgen/regression-diffs/
          if-no-files-found: ignore

      - name: Post PR comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            let body = fs.readFileSync('javascript-astgen/regression-report.md', 'utf8');
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            body += `\n\n---\n📎 Full diff files available as [workflow artifacts](${runUrl}).`;
            const marker = '<!-- astgen-regression -->';
            body = marker + '\n' + body;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
