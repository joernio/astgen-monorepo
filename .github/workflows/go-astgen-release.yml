name: Go AST Generator Release

on:
  push:
    tags:
      - 'go-astgen/v*'
  workflow_dispatch:

concurrency: go-astgen-release

permissions:
  contents: write

defaults:
  run:
    working-directory: go-astgen

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'
      - name: Discover latest tag (manual run)
        if: github.event_name == 'workflow_dispatch'
        run: |
          LATEST_TAG=$(git tag --list 'go-astgen/v*' --sort=-v:refname | head -n 1)
          echo "RELEASE_TAG=$LATEST_TAG" >> $GITHUB_ENV
          echo "Using latest tag: $LATEST_TAG"
        working-directory: .
      - name: Set tag from push event
        if: github.event_name == 'push'
        run: |
          echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
        working-directory: .
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21.12
      - name: Extract version from tag
        run: |
          TAG_VERSION=${RELEASE_TAG#go-astgen/v}
          echo "TAG_VERSION=$TAG_VERSION" >> $GITHUB_ENV
          echo "The tag version is: v$TAG_VERSION"
      - name: Build
        run: |
          GOOS=linux GOARCH=amd64 go build -o build/goastgen-linux -ldflags "-X main.Version=v${{ env.TAG_VERSION }}"
          GOOS=linux GOARCH=arm64 go build -o build/goastgen-linux-arm64 -ldflags "-X main.Version=v${{ env.TAG_VERSION }}"
          GOOS=windows GOARCH=amd64 go build -o build/goastgen-windows.exe -ldflags "-X main.Version=v${{ env.TAG_VERSION }}"
          GOOS=darwin GOARCH=amd64 go build -o build/goastgen-macos -ldflags "-X main.Version=v${{ env.TAG_VERSION }}"
          GOOS=darwin GOARCH=arm64 go build -o build/goastgen-macos-arm64 -ldflags "-X main.Version=v${{ env.TAG_VERSION }}"
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            go-astgen/build/goastgen-linux
            go-astgen/build/goastgen-linux-arm64
            go-astgen/build/goastgen-windows.exe
            go-astgen/build/goastgen-macos
            go-astgen/build/goastgen-macos-arm64
