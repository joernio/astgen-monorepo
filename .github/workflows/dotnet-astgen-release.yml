name: .NET AST Generator Release

on:
  push:
    tags:
      - 'dotnet-astgen/v*'
  workflow_dispatch:

concurrency: dotnet-astgen-release

permissions:
  contents: write

defaults:
  run:
    working-directory: dotnet-astgen

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'
      - name: Discover latest tag (manual run)
        if: github.event_name == 'workflow_dispatch'
        run: |
          LATEST_TAG=$(git tag --list 'dotnet-astgen/v*' --sort=-v:refname | head -n 1)
          echo "RELEASE_TAG=$LATEST_TAG" >> $GITHUB_ENV
          echo "Using latest tag: $LATEST_TAG"
        working-directory: .
      - name: Set tag from push event
        if: github.event_name == 'push'
        run: |
          echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
        working-directory: .
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'
      - name: Extract version from tag
        run: |
          TAG_VERSION=${RELEASE_TAG#dotnet-astgen/v}
          echo "NEXT_VERSION=v$TAG_VERSION" >> $GITHUB_ENV
          echo "The tag version is: v$TAG_VERSION"
      - name: Install dependencies
        run: dotnet restore
      - name: Compile
        run: ./build-with-version.sh $NEXT_VERSION
      - name: Build
        run: |
          ./publish-release.sh linux x64
          ./publish-release.sh linux arm64
          ./publish-release.sh osx x64
          ./publish-release.sh win x64
      - name: Rename
        run: |
          mv ./release/linux/DotNetAstGen dotnetastgen-linux
          mv ./release/linux-arm/DotNetAstGen dotnetastgen-linux-arm64
          mv ./release/macos/DotNetAstGen dotnetastgen-macos
          mv ./release/win/DotNetAstGen.exe dotnetastgen-win.exe
      - name: Make executable
        run: |
          chmod +x dotnetastgen-linux-arm64
          chmod +x dotnetastgen-macos
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dotnet-astgen/dotnetastgen-linux
            dotnet-astgen/dotnetastgen-linux-arm64
            dotnet-astgen/dotnetastgen-macos
            dotnet-astgen/dotnetastgen-win.exe
