# astgen-regression configuration
project:
  name: "javascript-astgen"
  language: "javascript"

build:
  install_command: "yarn install"
  build_command: "yarn build"
  dist_dir: "dist"

execute:
  command: "node {dist_dir}/astgen.js -i {input_dir} -o {output_dir} -t ts"
  timeout: 600  # seconds

artifacts:
  - name: "AST"
    pattern: "*.json"
    description: "Abstract Syntax Tree files"
  - name: "typemap"
    pattern: "*.typemap"
    description: "TypeScript type mapping files"

corpora:
  - name: "typeorm"
    label: "typeorm/typeorm@0.3.21"
    clone_url: "https://github.com/typeorm/typeorm.git"
    tag: "0.3.21"
    input_subdir: "src"
  - name: "fastify"
    label: "fastify/fastify@v5.3.3"
    clone_url: "https://github.com/fastify/fastify.git"
    tag: "v5.3.3"
    input_subdir: ""

github:
  base_branch: "main"
  python_version: "3.12"
  setup_action:
    uses: "actions/setup-node@v6"
    with:
      node-version: "24"
      cache: "yarn"
